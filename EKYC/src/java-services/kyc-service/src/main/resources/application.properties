server.port=${KYC_SERVICE_PORT:3002}
spring.application.name=kyc-service

# AWS
aws.region=${AWS_REGION:ap-southeast-1}
aws.access-key-id=${AWS_ACCESS_KEY_ID}
aws.secret-access-key=${AWS_SECRET_ACCESS_KEY}
aws.session-token=${AWS_SESSION_TOKEN:}
aws.dynamodb.endpoint=${DYNAMODB_ENDPOINT:}
aws.s3.bucket=${AWS_S3_BUCKET}
aws.dynamodb.table=${DYNAMODB_TABLE:ekyc-applications}

# Multipart upload limit (8 MB)
spring.servlet.multipart.max-file-size=8MB
spring.servlet.multipart.max-request-size=10MB

# CORS — allow requests from the API gateway only
app.gateway-url=${GATEWAY_URL:http://localhost:3000}

# Logging
logging.level.com.tng.ekyc=INFO
logging.pattern.console=%d{HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n
